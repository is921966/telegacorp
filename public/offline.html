<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Corp — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f; color: #e5e5e5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #a3a3a3; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #2563eb; color: white; border: none; border-radius: 8px;
      padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Нет соединения</h1>
    <p>Проверьте подключение к интернету. Кэшированные данные будут доступны при восстановлении связи.</p>
    <button onclick="window.location.reload()">Повторить</button>
  </div>
</body>
</html>
